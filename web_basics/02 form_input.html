<!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module02: input, button</title>
 </head>
 <body>

    <label for="f_name">Your first name:</label>
    <input type="text" placeholder="Anita Dick" name="f_name">
    <br><br>

    <label for="u_email">Your e-mail:</label>
    <input type="email" placeholder="urname@email.com" name="u_email">
    <br><br>

    <label for="u_phone">Your phone number:</label>
    <input type="number" placeholder="+254712345678" name="u_phone"
 </body>
</html>
