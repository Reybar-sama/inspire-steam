<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module05: classes, ids</title>
</head>
<body>
    <!--
        id: unique,  only one element in a page should have it
        
        class: reusable, used to identify multiple elements together
    -->
    <div id="page-wrapper">
        <h1>Linkin Park</h1>
        <p>Disc: The peak of alternate rock over a decade.</p>

        <img class="band-photos" src="./assets/images/balls.jpg" alt="band photo">
        <img class="band-photos" src="./assets/images/jdmact-27-10-2023-0001.jpg" alt="band photo">
    </div>
</body>
</html>
